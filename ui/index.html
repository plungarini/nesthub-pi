<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>nesthub-pi | Control Panel</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--bg-color: #0c0e12;
				--accent-color: #4285f4;
				--accent-glow: rgba(66, 133, 244, 0.3);
				--card-bg: rgba(255, 255, 255, 0.03);
				--border-color: rgba(255, 255, 255, 0.08);
				--text-primary: #f8f9fa;
				--text-secondary: #9da3ae;
				--success-color: #00c853;
				--error-color: #ff5252;
				--warning-color: #ffab00;
			}

			* {
				box-sizing: border-box;
				transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
			}

			body {
				font-family: 'Inter', system-ui, sans-serif;
				background: var(--bg-color);
				background-image:
					radial-gradient(circle at 0% 0%, rgba(66, 133, 244, 0.05) 0%, transparent 50%),
					radial-gradient(circle at 100% 100%, rgba(66, 133, 244, 0.03) 0%, transparent 50%);
				color: var(--text-primary);
				max-width: 720px;
				margin: 0 auto;
				padding: 3rem 1.5rem;
				line-height: 1.6;
				min-height: 100vh;
			}

			h1 {
				font-family: 'Outfit', sans-serif;
				font-weight: 700;
				font-size: 2.5rem;
				margin-bottom: 2rem;
				background: linear-gradient(135deg, #fff 0%, #9da3ae 100%);
				-webkit-background-clip: text;
				background-clip: text;
				-webkit-text-fill-color: transparent;
				letter-spacing: -0.02em;
				text-align: center;
			}

			.dashboard-grid {
				display: flex;
				flex-direction: column;
				gap: 2rem;
			}

			.card {
				background: var(--card-bg);
				backdrop-filter: blur(12px);
				-webkit-backdrop-filter: blur(12px);
				border: 1px solid var(--border-color);
				border-radius: 20px;
				padding: 2rem;
				position: relative;
				overflow: hidden;
			}

			.card::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 1px;
				background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
			}

			h3 {
				font-family: 'Outfit', sans-serif;
				font-weight: 600;
				margin-top: 0;
				color: var(--text-primary);
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			.status-badge {
				font-size: 0.75rem;
				padding: 0.35rem 0.75rem;
				border-radius: 100px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.05em;
				display: flex;
				align-items: center;
				gap: 0.5rem;
			}

			.status-badge::before {
				content: '';
				width: 8px;
				height: 8px;
				border-radius: 50%;
				display: inline-block;
			}

			.badge-live {
				background: rgba(0, 200, 83, 0.1);
				color: var(--success-color);
				box-shadow: 0 0 15px rgba(0, 200, 83, 0.15);
			}
			.badge-live::before {
				background: var(--success-color);
				box-shadow: 0 0 8px var(--success-color);
				animation: pulse 2s infinite;
			}

			.badge-disconnected {
				background: rgba(255, 82, 82, 0.1);
				color: var(--error-color);
			}
			.badge-disconnected::before {
				background: var(--error-color);
			}

			.badge-connecting {
				background: rgba(255, 171, 0, 0.1);
				color: var(--warning-color);
			}
			.badge-connecting::before {
				background: var(--warning-color);
				animation: pulse 1s infinite;
			}

			@keyframes pulse {
				0% {
					opacity: 1;
					transform: scale(1);
				}
				50% {
					opacity: 0.5;
					transform: scale(1.2);
				}
				100% {
					opacity: 1;
					transform: scale(1);
				}
			}

			.info-row {
				display: flex;
				justify-content: space-between;
				margin-bottom: 0.75rem;
				font-size: 0.95rem;
			}

			.label {
				color: var(--text-secondary);
			}
			.value {
				color: var(--text-primary);
				font-weight: 500;
			}

			.button-group {
				display: flex;
				gap: 1rem;
				margin-top: 1.5rem;
			}

			button {
				flex: 1;
				padding: 0.8rem 1.2rem;
				border-radius: 12px;
				font-weight: 600;
				font-size: 0.95rem;
				cursor: pointer;
				border: 1px solid transparent;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 0.5rem;
				font-family: 'Inter', sans-serif;
			}

			.btn-primary {
				background: var(--accent-color);
				color: white;
				box-shadow: 0 4px 15px var(--accent-glow);
			}

			.btn-primary:hover:not(:disabled) {
				transform: translateY(-2px);
				box-shadow: 0 6px 20px var(--accent-glow);
				filter: brightness(1.1);
			}

			.btn-outline {
				background: transparent;
				border-color: var(--border-color);
				color: var(--text-primary);
			}

			.btn-outline:hover:not(:disabled) {
				background: rgba(255, 255, 255, 0.05);
				border-color: rgba(255, 255, 255, 0.2);
			}

			.btn-danger {
				background: rgba(255, 82, 82, 0.1);
				border-color: rgba(255, 82, 82, 0.2);
				color: var(--error-color);
			}

			.btn-danger:hover:not(:disabled) {
				background: rgba(255, 82, 82, 0.2);
				transform: translateY(-2px);
			}

			button:disabled {
				opacity: 0.4;
				cursor: not-allowed;
				transform: none !important;
			}

			.preview-section {
				padding: 0rem;
			}

			.preview-section h3 {
				justify-content: center;
				margin-bottom: 1.5rem;
			}

			.preview-container {
				margin-top: 1.5rem;
				border-radius: 12px;
				overflow: hidden;
				border: 1px solid var(--border-color);
				background: black;
				aspect-ratio: 1024 / 600;
				width: 100%;
				box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
				position: relative;
			}

			iframe {
				width: 1024px;
				height: 600px;
				border: none;
				position: absolute;
				top: 0;
				left: 0;
				transform-origin: top left;
			}

			@media (max-width: 600px) {
				body {
					padding: 2rem 1rem;
				}
				h1 {
					font-size: 2rem;
				}
				.card {
					padding: 1.5rem;
				}
			}
		</style>
	</head>
	<body>
		<h1>nesthub-pi</h1>

		<div class="dashboard-grid">
			<div class="card">
				<h3>Status <span id="status-badge" class="status-badge badge-disconnected">Checking...</span></h3>

				<div class="info-row">
					<span class="label">Cast Device</span>
					<span id="device-info" class="value">-</span>
				</div>
				<div class="info-row">
					<span class="label">Connected At</span>
					<span id="connected-at" class="value">-</span>
				</div>

				<div class="button-group">
					<button id="connect-btn" class="btn-primary">
						<svg
							width="20"
							height="20"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<path d="M5 12h14" />
							<path d="m12 5 7 7-7 7" />
						</svg>
						Launch App
					</button>
					<button id="disconnect-btn" class="btn-danger">
						<svg
							width="20"
							height="20"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
						>
							<rect width="18" height="18" x="3" y="3" rx="2" ry="2" />
							<path d="M9 9h6v6H9z" />
						</svg>
						Stop
					</button>
				</div>
			</div>

			<div class="preview-section">
				<h3>Content Preview</h3>
				<div class="preview-container">
					<iframe src="/content" title="Nest Hub Preview"></iframe>
				</div>
			</div>
		</div>

		<script>
			const statusBadge = document.getElementById('status-badge');
			const deviceInfo = document.getElementById('device-info');
			const connectedAt = document.getElementById('connected-at');
			const connectBtn = document.getElementById('connect-btn');
			const disconnectBtn = document.getElementById('disconnect-btn');

			async function updateStatus() {
				try {
					const res = await fetch('/cast/status');
					const data = await res.json();

					statusBadge.textContent = data.state;
					statusBadge.className = `status-badge badge-${data.state}`;
					deviceInfo.textContent = data.deviceIp || 'Not Configured';

					if (data.connectedAt) {
						const date = new Date(data.connectedAt);
						connectedAt.textContent = date.toLocaleTimeString([], {
							hour: '2-digit',
							minute: '2-digit',
							second: '2-digit',
						});
					} else {
						connectedAt.textContent = 'Never';
					}

					connectBtn.disabled = data.state !== 'disconnected';
					disconnectBtn.disabled = data.state === 'disconnected';
				} catch (err) {
					statusBadge.textContent = 'OFFLINE';
					statusBadge.className = 'status-badge badge-disconnected';
				}
			}

			connectBtn.onclick = async () => {
				connectBtn.disabled = true;
				try {
					await fetch('/cast/connect', { method: 'POST' });
					updateStatus();
				} catch (e) {
					console.error(e);
				}
			};

			disconnectBtn.onclick = async () => {
				try {
					await fetch('/cast/disconnect', { method: 'POST' });
					updateStatus();
				} catch (e) {
					console.error(e);
				}
			};

			// Pixel-perfect iframe scaling
			const previewContainer = document.querySelector('.preview-container');
			const iframe = previewContainer.querySelector('iframe');

			const resizeObserver = new ResizeObserver((entries) => {
				for (let entry of entries) {
					const width = entry.contentRect.width;
					const scale = width / 1024;
					iframe.style.transform = `scale(${scale})`;
				}
			});

			resizeObserver.observe(previewContainer);

			setInterval(updateStatus, 3000);
			updateStatus();
		</script>
	</body>
</html>
