<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>nesthub-pi Receiver</title>
		<style>
			body {
				background: black;
				margin: 0;
				padding: 0;
				overflow: hidden;
				width: 100vw;
				height: 100vh;
			}
			#content {
				width: 100%;
				height: 100%;
			}
		</style>
		<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
	</head>
	<body>
		<div id="content"></div>

		<script>
			const DEV_URL = 'https://mini-gaming-g1.tail1bdae0.ts.net';
			const PROD_URL = 'https://aurora.tail1bdae0.ts.net';

			const isDev = new URLSearchParams(location.search).get('dev') === 'true';
			const TUNNEL_PUBLIC_URL = isDev ? DEV_URL : PROD_URL;

			console.log(`[RECEIVER] Starting in ${isDev ? 'DEV' : 'PROD'} mode.`);

			// ─── Content Polling ──────────────────────────────────────────────
			async function refreshContent() {
				try {
					const res = await fetch(`${TUNNEL_PUBLIC_URL}/content`);
					if (res.ok) {
						document.getElementById('content').innerHTML = await res.text();
						navigator.sendBeacon(TUNNEL_PUBLIC_URL + '/api/cast/heartbeat', '{}');
					}
				} catch (e) {
					console.error('[RECEIVER] Failed to poll content', e);
				}
			}
			refreshContent();
			setInterval(refreshContent, 5000);

			// ─── Cast Setup ───────────────────────────────────────────────────
			// cast-media-player must be added before context.start()
			const mediaPlayer = document.createElement('cast-media-player');
			mediaPlayer.style.display = 'none';
			document.body.appendChild(mediaPlayer);

			const context = cast.framework.CastReceiverContext.getInstance();

			// playerManager must be obtained before context.start()
			const playerManager = context.getPlayerManager();

			context.start({
				disableIdleTimeout: true,
				uiConfig: { touchScreenOptimizedApp: true },
			});

			// Disable Cast SDK touch overlay
			const observer = new MutationObserver(() => {
				const tc = document.querySelector('touch-controls');
				if (tc) {
					tc.style.cssText = 'pointer-events:none!important';
					observer.disconnect();
					console.log('[RECEIVER] touch-controls overlay disabled');
				}
			});
			observer.observe(document.body, { childList: true, subtree: true });

			// ─── Audio Context ────────────────────────────────────────────────
			let audioCtx;
			function startAudio() {
				audioCtx = new AudioContext();
				audioCtx.resume().then(() => {
					console.log('[RECEIVER] AudioContext state:', audioCtx.state);
					const osc = audioCtx.createOscillator();
					const gain = audioCtx.createGain();
					gain.gain.value = 0;
					osc.connect(gain);
					gain.connect(audioCtx.destination);
					osc.start();
				});
			}
			function resumeAudio() {
				if (audioCtx && ['suspended', 'interrupted'].includes(audioCtx.state)) {
					audioCtx.resume().then(() => {
						console.log('[RECEIVER] AudioContext resumed');
					});
				}
			}

			// ─── Keep-alive ───────────────────────────────────────────────────
			// Plays a static image via Cast SDK every 9 minutes.
			// StreamType.NONE = no duration, no END_OF_STREAM, session stays PLAYING.
			// Mirrors the approach used by ha-catt-fix and official HA Cast integration.
			function keepAlive() {
				const request = new cast.framework.messages.LoadRequestData();
				request.autoplay = true;
				request.requestId = 0;
				request.media = new cast.framework.messages.MediaInformation();
				request.media.contentId = TUNNEL_PUBLIC_URL + '/api/keepalive.png';
				request.media.contentType = 'image/png';
				request.media.streamType = cast.framework.messages.StreamType.NONE;
				const metadata = new cast.framework.messages.GenericMediaMetadata();
				metadata.title = 'keepalive ' + new Date().toTimeString();
				request.media.metadata = metadata;
				playerManager.load(request);
				resumeAudio();
				console.log('[RECEIVER] Keep-alive ping sent');
				setTimeout(keepAlive, 9 * 60 * 1000);
			}

			// ─── Cast State Reporting ─────────────────────────────────────────
			function reportState(visible, reason) {
				const payload = JSON.stringify({ visible, reason, ts: Date.now() });
				try {
					navigator.sendBeacon(TUNNEL_PUBLIC_URL + '/api/cast/state', payload);
					console.log('[STATE] reported:', reason, visible);
				} catch (e) {
					console.warn('[STATE] sendBeacon failed:', e);
				}
			}

			document.addEventListener('visibilitychange', () => {
				console.log('[STATE] visibilitychange →', document.visibilityState);
				reportState(!document.hidden, 'visibilitychange');
			});
			window.addEventListener('pagehide', () => {
				console.log('[STATE] pagehide fired');
				reportState(false, 'pagehide');
			});
			context.addEventListener('shutdown', () => {
				console.log('[STATE] Cast SHUTDOWN fired');
				reportState(false, 'cast-shutdown');
			});
			context.addEventListener('standbychaned', (e) => {
				console.log('[STATE] STANDBY_CHANGED, isStandby:', e.isStandby);
				if (e.isStandby) reportState(false, 'cast-standby');
			});
			context.addEventListener('visibilitychanged', (e) => {
				console.log('[STATE] VISIBILITY_CHANGED, isVisible:', e.isVisible);
				if (!e.isVisible) reportState(false, 'cast-visibility');
			});
			context.addEventListener('proximitychanged', (e) => {
				console.log('[STATE] PROXIMITY_CHANGED:', JSON.stringify(e));
			});

			// ─── READY ────────────────────────────────────────────────────────
			context.addEventListener(cast.framework.system.EventType.READY, () => {
				console.log('[RECEIVER] READY');
				startAudio();
				keepAlive();
				reportState(true, 'load');
			});
		</script>
	</body>
</html>
