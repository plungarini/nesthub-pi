<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>nesthub-pi Receiver</title>
		<style>
			body {
				background: black;
				color: white;
				margin: 0;
				padding: 0;
				overflow: hidden;
				width: 100vw;
				height: 100vh;
			}
			#content {
				width: 100%;
				height: 100%;
				display: flex;
				align-items: center;
				justify-content: center;
			}
		</style>
		<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
	</head>
	<body>
		<audio id="keepalive" loop style="display: none">
			<source
				src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="
				type="audio/wav"
			/>
		</audio>

		<div id="content">Loading...</div>

		<script>
			const DEV_URL = 'https://mini-gaming-g1.tail1bdae0.ts.net';
			const PROD_URL = 'https://aurora.tail1bdae0.ts.net';

			const isDev = new URLSearchParams(location.search).get('dev') === 'true';
			const TUNNEL_PUBLIC_URL = isDev ? DEV_URL : PROD_URL;

			const context = cast.framework.CastReceiverContext.getInstance();
			const options = new cast.framework.CastReceiverOptions();
			options.disableIdleTimeout = true;

			async function refreshContent() {
				try {
					const res = await fetch(TUNNEL_PUBLIC_URL + '/content');
					if (res.ok) {
						const html = await res.text();
						document.getElementById('content').innerHTML = html;
					}
				} catch (e) {
					console.error('Failed to poll content', e);
				}
			}

			context.start(options);

			// Silent audio loop — keeps Cast SDK in PLAYING state so
			// Fuchsia ambient mode doesn't kill the app (disableIdleTimeout
			// alone doesn't stop the OS-level ambient mode trigger)
			const ka = document.getElementById('keepalive');
			ka.volume = 0;
			ka.play().catch(() => {});

			refreshContent();
			setInterval(refreshContent, 5000);
		</script>
	</body>
</html>
