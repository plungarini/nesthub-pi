<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>nesthub-pi Receiver</title>
		<style>
			body {
				background: black;
				margin: 0;
				padding: 0;
				overflow: hidden;
				width: 100vw;
				height: 100vh;
			}
			#content {
				width: 100%;
				height: 100%;
			}
		</style>
		<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
	</head>
	<body>
		<div id="content"></div>

		<script>
			const DEV_URL = 'https://mini-gaming-g1.tail1bdae0.ts.net';
			const PROD_URL = 'https://aurora.tail1bdae0.ts.net';

			const isDev = new URLSearchParams(location.search).get('dev') === 'true';
			const TUNNEL_PUBLIC_URL = isDev ? DEV_URL : PROD_URL;

			console.log(`[RECEIVER] Starting in ${isDev ? 'DEV' : 'PROD'} mode.`);

			// Load content via polling (receiver handles refresh, not iframe)
			async function refreshContent() {
				try {
					const res = await fetch(`${TUNNEL_PUBLIC_URL}/content`);
					if (res.ok) {
						document.getElementById('content').innerHTML = await res.text();
						// Heartbeat — confirms receiver is alive and fetching
						navigator.sendBeacon(TUNNEL_PUBLIC_URL + '/api/cast/heartbeat', '{}');
					}
				} catch (e) {
					console.error('[RECEIVER] Failed to poll content', e);
				}
			}

			refreshContent();
			setInterval(refreshContent, 5000);

			const context = cast.framework.CastReceiverContext.getInstance();

			context.start({
				disableIdleTimeout: true,
				uiConfig: { touchScreenOptimizedApp: true },
			});

			// Cast SDK injects <touch-controls> after start() which blocks all
			// DOM pointer events. Disable it so our elements can receive touch.
			const observer = new MutationObserver(() => {
				const tc = document.querySelector('touch-controls');
				if (tc) {
					tc.style.cssText = 'pointer-events:none!important';
					observer.disconnect();
					console.log('[RECEIVER] touch-controls overlay disabled');
				}
			});
			observer.observe(document.body, { childList: true, subtree: true });

			// ─── Audio Context ──────────────────────────────────────────────
			let audioCtx;
			function startAudio() {
				audioCtx = new AudioContext();
				audioCtx.resume().then(() => {
					console.log('[RECEIVER] AudioContext state:', audioCtx.state);
					const osc = audioCtx.createOscillator();
					const gain = audioCtx.createGain();
					gain.gain.value = 0;
					osc.connect(gain);
					gain.connect(audioCtx.destination);
					osc.start();
				});
			}

			function resumeAudio() {
				if (audioCtx && ['suspended', 'interrupted'].includes(audioCtx.state)) {
					audioCtx.resume().then(() => {
						console.log('[RECEIVER] AudioContext resumed on user interaction');
					});
				} else {
					console.log('[RECEIVER] AudioContext is already running. No need to resume.');
				}
			}

			// ─── Cast State Reporting ────────────────────────────────────────────────
			// Uses multiple browser + Cast SDK signals to detect ambient mode / suspension.
			// sendBeacon is used intentionally — it fires reliably during page suspend.
			function reportState(visible, reason) {
				const payload = JSON.stringify({ visible, reason, ts: Date.now() });
				try {
					navigator.sendBeacon(TUNNEL_PUBLIC_URL + '/api/cast/state', payload);
					console.log('[STATE] reported:', reason, visible);
				} catch (e) {
					console.warn('[STATE] sendBeacon failed:', e);
				}
			}

			// 1. Page Visibility API — PRIMARY signal for Fuchsia ambient mode
			document.addEventListener('visibilitychange', () => {
				const visible = !document.hidden;
				console.log('[STATE] visibilitychange →', document.visibilityState);
				reportState(visible, 'visibilitychange');
			});

			// 2. Page hide — fires before unload, reliable last-resort signal
			window.addEventListener('pagehide', () => {
				console.log('[STATE] pagehide fired');
				reportState(false, 'pagehide');
			});

			// 3. Cast SDK SHUTDOWN — fires if Cast properly terminates the app
			//    (may not fire for ambient mode suspension, but costs nothing)
			context.addEventListener('shutdown', () => {
				console.log('[STATE] Cast SHUTDOWN fired');
				reportState(false, 'cast-shutdown');
			});

			// 4. Cast SDK STANDBY_CHANGED — HDMI/CEC based, likely won't fire on Nest Hub
			//    Included as passive observer — log only, do not report
			context.addEventListener('standbychaned', (e) => {
				console.log('[STATE] STANDBY_CHANGED, isStandby:', e.isStandby);
				if (e.isStandby) reportState(false, 'cast-standby');
			});

			// 5. Cast SDK VISIBILITY_CHANGED — HDMI input based, likely won't fire on Nest Hub
			//    Included as passive observer — log only, do not report
			context.addEventListener('visibilitychanged', (e) => {
				console.log('[STATE] VISIBILITY_CHANGED, isVisible:', e.isVisible);
				if (!e.isVisible) reportState(false, 'cast-visibility');
			});

			// 6. PROXIMITY_CHANGED — fires from ultrasound sensor (Nest Hub has this)
			//    Log only for now — correlate with ambient mode in testing
			context.addEventListener('proximitychanged', (e) => {
				console.log('[STATE] PROXIMITY_CHANGED:', JSON.stringify(e));
			});

			// ─── Sleep Interval ────────────────────────────────────────────────
			function beforeSleep() {
				resumeAudio();
			}
			function startSleepInterval() {
				setInterval(beforeSleep, 9 * 60 * 1000);
			}

			// ─── READY state ──────────────────────────────────────────────
			context.addEventListener(cast.framework.system.EventType.READY, () => {
				console.log('[RECEIVER] READY state');

				startAudio();

				startSleepInterval();
				reportState(true, 'load');
			});
		</script>
	</body>
</html>
