<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>nesthub-pi Receiver</title>
		<style>
			body {
				background: black;
				margin: 0;
				padding: 0;
				overflow: hidden;
				width: 100vw;
				height: 100vh;
			}
			#content {
				width: 100%;
				height: 100%;
			}
		</style>
		<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
	</head>
	<body>
		<div id="content"></div>

		<script>
			const DEV_URL = 'https://mini-gaming-g1.tail1bdae0.ts.net';
			const PROD_URL = 'https://aurora.tail1bdae0.ts.net';

			const isDev = new URLSearchParams(location.search).get('dev') === 'true';
			const TUNNEL_PUBLIC_URL = isDev ? DEV_URL : PROD_URL;

			console.log(`[RECEIVER] Starting in ${isDev ? 'DEV' : 'PROD'} mode.`);

			// Load content via polling (receiver handles refresh, not iframe)
			async function refreshContent() {
				try {
					const res = await fetch(`${TUNNEL_PUBLIC_URL}/content`);
					if (res.ok) {
						document.getElementById('content').innerHTML = await res.text();
					}
				} catch (e) {
					console.error('[RECEIVER] Failed to fetch content:', e);
				}
			}
			refreshContent();
			setInterval(refreshContent, 5000);

			const context = cast.framework.CastReceiverContext.getInstance();

			context.start({
				disableIdleTimeout: true,
				uiConfig: { touchScreenOptimizedApp: true },
			});

			// Cast SDK injects <touch-controls> after start() which blocks all
			// DOM pointer events. Disable it so our elements can receive touch.
			const observer = new MutationObserver(() => {
				const tc = document.querySelector('touch-controls');
				if (tc) {
					tc.style.cssText = 'pointer-events:none!important';
					observer.disconnect();
					console.log('[RECEIVER] touch-controls overlay disabled');
				}
			});
			observer.observe(document.body, { childList: true, subtree: true });

			// Silent audio — keeps Cast SDK in PLAYING state so Fuchsia
			// ambient mode doesn't kill the app (disableIdleTimeout alone
			// doesn't stop the OS-level ambient mode trigger)
			const audioCtx = new AudioContext();
			const oscillator = audioCtx.createOscillator();
			const gain = audioCtx.createGain();
			gain.gain.value = 0;
			oscillator.connect(gain);
			gain.connect(audioCtx.destination);
			oscillator.start();
		</script>
	</body>
</html>
